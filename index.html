<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
window.onerror = function(msg, url, line) {
  document.body.insertAdjacentHTML('afterbegin', '<p style="background:red;color:white">JS ERREUR: ' + msg + ' (ligne ' + line + ')</p>');
};
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Grand Index de mes Recettes</title>

<link rel="stylesheet" href="css/style.css">
</head>

  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    alert("Service workers trouvés : " + regs.length);
    regs.forEach(r => r.unregister());
  });
} else {
  alert("Pas de service worker supporté");
}
</script>

<div id="modalAgenda" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 id="modalTitreRecette"></h3>
    <label for="modalDateInput">Choisir une date :</label><br>
    <input type="date" id="modalDateInput">
    <div class="modal-actions">
      <button id="modalAnnuler">Annuler</button>
      <button id="modalConfirmer">Ajouter</button>
    </div>
  </div>
</div>

  
<body>

<header>
<h1>📚 Grand Index de mes Recettes</h1>
</header>

<nav>

<button id="btnLivres">📚 Livres</button>

<button id="btnRecettes">🍽️ Recettes</button>

<button id="btnFavoris">⭐ Favoris</button>

<button id="btnIngredients">🥕 Ingrédients</button>

 <button id="btnAgenda">📅 Agenda</button>

  <section id="pageAgenda" style="display:none"></section>


</nav>

<main>

<section id="pageLivres"></section>

<section id="pageRecettes" style="display:none">

<input
id="search"
placeholder="Rechercher une recette ou un ingrédient..."
>

<div id="results"></div>

</section>

<section id="pageFavoris" style="display:none"></section>

<section id="pageIngredients" style="display:none"></section>

</main>

<script src="js/app.js?v=7"></script>

  <script>
document.body.insertAdjacentHTML('beforeend', '<p style="background:lime">Ce script inline fonctionne</p>');
</script>


</body>
</html>
